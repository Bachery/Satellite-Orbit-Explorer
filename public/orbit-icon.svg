<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Satellite Orbit Explorer icon</title>
  <desc id="desc">A stylized Earth with an inclined satellite orbit.</desc>
  <defs>
    <radialGradient id="earth" cx="35%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#69e3ff"/>
      <stop offset="48%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#0b2a55"/>
    </radialGradient>
    <linearGradient id="orbit" x1="5" y1="13" x2="59" y2="51">
      <stop offset="0%" stop-color="#5dffb0"/>
      <stop offset="52%" stop-color="#45d9ff"/>
      <stop offset="100%" stop-color="#ffcf5a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="15" fill="#070b12"/>
  <circle cx="32" cy="32" r="14.5" fill="url(#earth)"/>
  <!-- <path d="M22.5 25.5c4.1 2.1 9.1 2.8 14.6 1.7 2.1-.4 4.2-1.1 6.4-2" fill="none" stroke="#9fe8ff" stroke-width="1.3" stroke-linecap="round" opacity=".55"/> -->
  <!-- <path d="M18.8 34.3c7.8-2.3 16.6-2.2 26.4.2" fill="none" stroke="#9fe8ff" stroke-width="1.2" stroke-linecap="round" opacity=".42"/> -->
  <!-- <path d="M28.2 18.5c-2.2 8.7-1.8 17.9 1.2 27.6" fill="none" stroke="#9fe8ff" stroke-width="1.1" stroke-linecap="round" opacity=".35"/> -->
  <!-- <path d="M38.6 19.9c-2.9 7.9-2.7 16 .5 24.2" fill="none" stroke="#9fe8ff" stroke-width="1.1" stroke-linecap="round" opacity=".32"/> -->

  <ellipse cx="32" cy="32" rx="27" ry="9.2" fill="none" stroke="url(#orbit)" stroke-width="2.4" transform="rotate(-31 32 32)" filter="url(#glow)"/>
  <!-- <path d="M8.1 46.9c7.1 4.5 17.7 5.9 29.2 3.8" fill="none" stroke="#45d9ff" stroke-width="1.2" stroke-linecap="round" opacity=".35"/> -->
  <circle cx="49.7" cy="17.6" r="4.3" fill="#ffcf5a" filter="url(#glow)"/>
  <circle cx="49.7" cy="17.6" r="1.5" fill="#fff8d2"/>
  <path d="M45.3 18.8l-5.8 1.8" fill="none" stroke="#ffcf5a" stroke-width="1.5" stroke-linecap="round" opacity=".75"/>
</svg>
